<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Niko AI - N Studios</title>
    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/vapi.browser.js"></script>
    <style>
        body { background: #000; color: #ff00ff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; text-align: center; }
        .niko-circle {
            width: 150px; height: 150px; background: #ff00ff;
            border-radius: 50%; box-shadow: 0 0 30px #ff00ff;
            cursor: pointer; border: 5px solid #fff; transition: 0.3s;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
        .info { margin-top: 10px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div class="niko-circle" id="nikoBtn"></div>
    <div id="status">SİSTEMİ UYANDIRMAK İÇİN TIKLA</div>
    <div class="info">Eğer tıklayınca değişmiyorsa F12 tuşuna basıp Console'a bak.</div>

    <script>
        // ANAHTARLARIN EN GÜNCEL HALİ
        const PUB_KEY = '4a9959e2-3154-45d1-ae41-11a9cdfd51d3';
        const ASST_ID = '71b539bc-fd3d-4e32-8781-17d5c0d64c0a';

        let vapi;
        
        try {
            vapi = new Vapi(PUB_KEY);
            console.log("Vapi Hazır!");
        } catch (e) {
            document.getElementById('status').innerText = "VAPİ YÜKLENEMEDİ!";
        }

        const btn = document.getElementById('nikoBtn');
        const status = document.getElementById('status');

        btn.onclick = () => {
            console.log("Halkaya tıklandı!");
            status.innerText = "BAĞLANTI DENENİYOR...";
            
            vapi.start(ASST_ID).then(() => {
                console.log("Niko Başlatıldı!");
            }).catch(err => {
                console.error("Hata:", err);
                status.innerText = "HATA: " + err.message;
            });
        };

        vapi.on('call-start', () => { status.innerText = "NIKO AKTİF - KONUŞABİLİRSİN"; });
        vapi.on('call-end', () => { status.innerText = "NIKO UYKUYA DALDI"; });
    </script>
</body>
</html>
