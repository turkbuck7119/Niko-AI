<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Niko AI - N Studios</title>
    <style>
        body { background: #000; color: #ff00ff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; margin: 0; }
        .niko-btn {
            width: 130px; height: 130px; background: #ff00ff;
            border-radius: 50%; border: 5px solid #fff;
            box-shadow: 0 0 30px #ff00ff; cursor: pointer;
            transition: 0.3s;
        }
        .niko-btn:active { transform: scale(0.9); }
        #status { margin-top: 20px; font-size: 18px; text-shadow: 0 0 10px #ff00ff; }
    </style>
</head>
<body>

    <div class="niko-btn" id="nikoBtn"></div>
    <div id="status">NIKO'YU UYANDIRMAK İÇİN DOKUN</div>

    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/vapi.browser.js"></script>

    <script>
        // BURAYA KENDİ ID'LERİNİ YAZ
        const vapi = new Vapi(4a9959e2-3154-45d1-ae41-11a9cdfd51d3);
        const ASSISTANT_ID = '7b882e8c-f4b6-4a32-8788-17c5513e9b71';

        const btn = document.getElementById('nikoBtn');
        const status = document.getElementById('status');

        btn.onclick = () => {
            vapi.start(ASSISTANT_ID);
            status.innerText = "BAĞLANILIYOR...";
        };

        vapi.on('call-start', () => { status.innerText = "NIKO DİNLİYOR..."; status.style.color = "#00ff00"; });
        vapi.on('call-end', () => { status.innerText = "NIKO UYKUDA"; status.style.color = "#ff00ff"; });
        vapi.on('speech-start', () => { status.innerText = "NIKO KONUŞUYOR..."; });
        vapi.on('speech-end', () => { status.innerText = "NIKO DİNLİYOR..."; });
        vapi.on('error', (e) => { 
            console.error(e);
            status.innerText = "HATA: TEKRAR DENE"; 
        });
    </script>
</body>
</html>
