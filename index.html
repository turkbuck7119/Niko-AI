<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niko AI - N Studios</title>
    <style>
        /* ESKİ MÜKEMMEL MOR TEMAMIZ (BUNU SİLMELİYDİK!) */
        body {
            background: #080810;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            overflow-y: auto;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #a020f0;
            text-shadow: 0 0 20px #a020f0;
            font-size: 2.2rem;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }
        p {
            color: #00ffff;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 0 8px #00ffff;
            letter-spacing: 1px;
        }
        
        /* MOR KÜRENİN TASARIMI */
        .niko-orb-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .niko-orb {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #b026ff 0%, #4a0082 100%);
            border-radius: 50%;
            border: 3px solid #e0b0ff;
            box-shadow: 0 0 40px #b026ff, inset 0 0 20px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .wave-ring {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #b026ff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .listening .niko-orb {
            animation: orbPulse 1.2s infinite ease-in-out;
            background: radial-gradient(circle, #da70d6 0%, #7b1f8f 100%);
            box-shadow: 0 0 50px #da70d6;
            border-color: #da70d6;
        }

        .listening .wave-ring {
            animation: ripple 1.5s infinite linear;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        #status {
            margin-top: 20px;
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            min-height: 45px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            padding: 0 10px;
        }
        #user-text {
            color: #888;
            font-style: italic;
            margin-top: 5px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* MESAJLAŞMA KUTUSU TASARIMI */
        .input-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .text-input {
            flex: 1;
            background: rgba(16, 16, 32, 0.9);
            border: 1.5px solid #a020f0;
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 0 5px rgba(160, 32, 240, 0.2);
            -webkit-appearance: none;
        }
        .text-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .send-btn {
            background: #a020f0;
            border: none;
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(160, 32, 240, 0.5);
            padding: 0;
            z-index: 20;
        }
        .send-btn:active {
            transform: scale(0.9);
            background: #b026ff;
        }
        .send-btn svg {
            pointer-events: none;
        }

        /* BUTON GRUBU VE YENİ DÜĞME STİLİ */
        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .action-btn {
            background: rgba(16, 16, 32, 0.6);
            border: 1px solid #a020f0;
            color: #a020f0;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            flex: 1;
            max-width: 150px;
        }
        .action-btn:active {
            background: #a020f0;
            color: #fff;
            box-shadow: 0 0 10px #a020f0;
        }
        
        /* ÖZEL "ANA EKRANA EKLE" BUTONU STİLİ */
        #add-to-home-btn {
            background: #00ffff;
            color: #000;
            border: none;
            font-weight: bold;
        }
        #add-to-home-btn:active {
            background: #fff;
            transform: scale(0.95);
        }
    </style>
</head>
