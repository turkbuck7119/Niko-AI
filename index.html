<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI - N Studios</title>
    <style>
        body {
            background: #080810;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 2;
        }
        h1 {
            color: #a020f0;
            text-shadow: 0 0 20px #a020f0;
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        p {
            color: #00ffff;
            font-size: 1rem;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 0 0 8px #00ffff;
            letter-spacing: 1px;
        }
        
        .niko-orb-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .niko-orb {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #b026ff 0%, #4a0082 100%);
            border-radius: 50%;
            border: 3px solid #e0b0ff;
            box-shadow: 0 0 40px #b026ff, inset 0 0 20px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        .niko-orb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px #e0b0ff;
        }

        .wave-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #b026ff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .listening .niko-orb {
            animation: orbPulse 1.2s infinite ease-in-out;
            background: radial-gradient(circle, #da70d6 0%, #7b1f8f 100%);
            box-shadow: 0 0 50px #da70d6;
            border-color: #da70d6;
        }

        .listening .wave-ring {
            animation: ripple 1.5s infinite linear;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        #status {
            margin-top: 35px;
            font-size: 1.1rem;
            color: #fff;
            font-weight: bold;
            min-height: 50px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            padding: 0 20px;
        }
        #user-text {
            color: #777;
            font-style: italic;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .action-btn {
            background: transparent;
            border: 1px solid #a020f0;
            color: #a020f0;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .action-btn:hover {
            background: #a020f0;
            color: #fff;
            box-shadow: 0 0 10px #a020f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NIKO AI</h1>
        <p>N Studios Resmi Asistanı</p>
        
        <div class="niko-orb-wrapper" id="orbContainer">
            <div class="wave-ring"></div>
            <div class="niko-orb" id="nikoBtn"></div>
        </div>
        
        <div id="status">Uykudayım... Uyandırmak için mor küreye dokun!</div>
        <div id="user-text"></div>
        
        <div class="btn-group">
            <button id="reset-api-btn" class="action-btn">API Değiştir</button>
            <a href="BURAYA_APK_LINKINI_YAZ" id="download-apk-btn" class="action-btn" target="_blank">Uygulamayı İndir (APK)</a>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = localStorage.getItem("groq_api_key");
        let activeAudioSource = null;
        let audioCtx = null;

        function checkApiKey() {
            if (!GROQ_API_KEY) {
                const userKey = prompt("Lütfen yeni Groq API anahtarınızı (gsk_...) girin:\n(Bu anahtar sadece tarayıcınızda saklanır!)");
                if (userKey && userKey.trim() !== "") {
                    GROQ_API_KEY = userKey.trim();
                    localStorage.setItem("groq_api_key", GROQ_API_KEY);
                    statusDiv.innerText = "Anahtar kaydedildi! Dokunarak Niko'yu uyandır.";
                    statusDiv.style.color = "#00ffff";
                } else {
                    statusDiv.innerText = "Hata: API anahtarı girilmedi!";
                    statusDiv.style.color = "#ff007f";
                }
            }
        }

        const nikoBtn = document.getElementById('nikoBtn');
        const orbContainer = document.getElementById('orbContainer');
        const statusDiv = document.getElementById('status');
        const userTextDiv = document.getElementById('user-text');
        const resetApiBtn = document.getElementById('reset-api-btn');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                orbContainer.classList.add('listening');
                statusDiv.innerHTML = "Dinliyorum... Seni dinliyorum!";
                statusDiv.style.color = "#00ffff";
            };

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript;
                userTextDiv.innerText = "Kullanıcı: " + userSpeech;
                statusDiv.innerText = "Düşünüyorum...";
                statusDiv.style.color = "#b026ff";
                
                await askNiko(userSpeech);
            };

            recognition.onerror = (event) => {
                console.error("Ses tanıma hatası:", event.error);
                resetButton();
                statusDiv.innerText = "Seni duyamadım, tekrar dener misin?";
                statusDiv.style.color = "#ff007f";
            };

            recognition.onend = () => { resetButton(); };
        } else {
            statusDiv.innerText = "Tarayıcın ses tanımayı desteklemiyor! Lütfen Chrome kullan.";
        }

        function resetButton() {
            isListening = false;
            orbContainer.classList.remove('listening');
        }

        nikoBtn.addEventListener('click', () => {
            if (!GROQ_API_KEY) {
                checkApiKey();
                return;
            }
            if (!SpeechRecognition) return;

            stopSpeaking();

            if (!isListening) {
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        resetApiBtn.addEventListener('click', () => {
            localStorage.removeItem("groq_api_key");
            GROQ_API_KEY = null;
            checkApiKey();
        });

        function stopSpeaking() {
            window.speechSynthesis.cancel();
            if (activeAudioSource) {
                try { activeAudioSource.stop(); } catch(e) {}
                activeAudioSource = null;
            }
            orbContainer.classList.remove('listening');
        }

        async function askNiko(promptText) {
            if (!GROQ_API_KEY) {
                statusDiv.innerText = "API anahtarı eksik!";
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [
                            {
                                role: "system",
                                content: "Sen N Studios tarafından geliştirilen, resmi bir yapay zeka asistanısın. Adın Niko. Ekrandaki mor parlayan, dalgalanan bir küre aracılığıyla kullanıcılarla iletişim kuruyorsun. Karşındaki her kullanıcıya karşı son derece cana yakın, zeki, esprili ve yardımcı olmalısın. Her zaman Türkçe konuşmalı, espriler yapmalı ve bazen dijital bir sistem olduğunu hatırlatan akıllıca şakalar eklemelisin. Cevapların kısa, net ve sesli okunmaya uygun olsun."
                            },
                            {
                                role: "user",
                                content: promptText
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    statusDiv.innerText = "Hata: " + (data.error ? data.error.message : "API Hatası.");
                    statusDiv.style.color = "#ff007f";
                    return;
                }

                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    statusDiv.innerText = reply;
                    statusDiv.style.color = "#fff";
                    
                    speakRobotic(reply);
                }

            } catch (error) {
                console.error("Sistemsel Hata:", error);
                statusDiv.innerText = "Bağlantı hatası yaşandı!";
                statusDiv.style.color = "#ff007f";
            }
        }

        async function speakRobotic(text) {
            stopSpeaking();

            statusDiv.innerText = "Niko konuşuyor...";
            statusDiv.style.color = "#b026ff";
            orbContainer.classList.add('listening');

            try {
                const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=tr&client=tw-ob&q=${encodeURIComponent(text)}`;
                const response = await fetch(ttsUrl);
                if (!response.ok) throw new Error("TTS fetch başarısız.");
                
                const arrayBuffer = await response.arrayBuffer();
                
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                
                // --- ROBOT FİLTRELERİ ---
                const filter = audioCtx.createBiquadFilter();
                filter.type = "bandpass";
                filter.frequency.value = 1100; 
                filter.Q.value = 1.8;

                const delayNode = audioCtx.createDelay();
                delayNode.delayTime.value = 0.012; 
                
                const delayGain = audioCtx.createGain();
                delayGain.gain.value = 0.75; 

                delayNode.connect(delayGain);
                delayGain.connect(delayNode);

                source.connect(filter);
                filter.connect(audioCtx.destination); 
                
                filter.connect(delayNode);
                delayNode.connect(audioCtx.destination); 

                activeAudioSource = source;

                source.onended = () => {
                    statusDiv.innerText = "Tekrar konuşmak için dokun!";
                    statusDiv.style.color = "#00ffff";
                    orbContainer.classList.remove('listening');
                    audioCtx.close();
                };

                source.start(0);

            } catch (err) {
                console.warn("Robotik ses oluşturulamadı, normal tarayıcı sesine geçiliyor:", err);
                fallbackSpeak(text);
            }
        }

        function fallbackSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            const voices = window.speechSynthesis.getVoices();
            const trVoice = voices.find(voice => voice.lang.includes('tr'));
            if (trVoice) {
                utterance.voice = trVoice;
            }

            utterance.rate = 1.1; 
            utterance.pitch = 0.9;

            utterance.onstart = () => {
                statusDiv.innerText = "Niko konuşuyor...";
                statusDiv.style.color = "#b026ff";
                orbContainer.classList.add('listening'); 
            };

            utterance.onend = () => {
                statusDiv.innerText = "Tekrar konuşmak için dokun!";
                statusDiv.style.color = "#00ffff";
                orbContainer.classList.remove('listening');
            };

            window.speechSynthesis.speak(utterance);
        }

        window.onload = () => {
            if (!GROQ_API_KEY) {
                checkApiKey();
            }
        };
    </script>
</body>
</html>
