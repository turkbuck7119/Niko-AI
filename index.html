<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI - N Studios</title>
    <style>
        body {
            background: #080810;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 2;
        }
        h1 {
            color: #a020f0;
            text-shadow: 0 0 20px #a020f0;
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        p {
            color: #00ffff;
            font-size: 1rem;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 0 0 8px #00ffff;
            letter-spacing: 1px;
        }
        
        /* Niko'nun Mor Yuvarlak Efekti */
        .niko-orb-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .niko-orb {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #b026ff 0%, #4a0082 100%);
            border-radius: 50%;
            border: 3px solid #e0b0ff;
            box-shadow: 0 0 40px #b026ff, inset 0 0 20px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        .niko-orb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px #e0b0ff;
        }

        /* Arka plandaki mor dalgalanma efekti */
        .wave-ring {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #b026ff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Aktif Dinleme Efekti */
        .listening .niko-orb {
            animation: orbPulse 1.2s infinite ease-in-out;
            background: radial-gradient(circle, #da70d6 0%, #7b1f8f 100%);
            box-shadow: 0 0 50px #da70d6;
            border-color: #da70d6;
        }

        .listening .wave-ring {
            animation: ripple 1.5s infinite linear;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        #status {
            margin-top: 35px;
            font-size: 1.2rem;
            color: #fff;
            font-weight: bold;
            min-height: 50px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        #user-text {
            color: #777;
            font-style: italic;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        #reset-api-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #a020f0;
            color: #a020f0;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        #reset-api-btn:hover {
            background: #a020f0;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NIKO AI</h1>
        <p>N Studios Resmi Asistanı</p>
        
        <div class="niko-orb-wrapper" id="orbContainer">
            <div class="wave-ring"></div>
            <div class="niko-orb" id="nikoBtn"></div>
        </div>
        
        <div id="status">Uykudayım... Uyandırmak için mor küreye dokun!</div>
        <div id="user-text"></div>
        <button id="reset-api-btn">API Anahtarını Değiştir</button>
    </div>

    <script>
        // --- API ANAHTARINI TARAYICI HAFIZASINDAN ÇEKİYORUZ ---
        let GROQ_API_KEY = localStorage.getItem("groq_api_key");

        // Eğer hafızada anahtar yoksa kullanıcıya soralım
        function checkApiKey() {
            if (!GROQ_API_KEY) {
                const userKey = prompt("Lütfen yeni Groq API anahtarınızı (gsk_...) girin:\n(Bu anahtar sadece sizin tarayıcınıza kaydedilir ve GitHub göremez!)");
                if (userKey && userKey.trim() !== "") {
                    GROQ_API_KEY = userKey.trim();
                    localStorage.setItem("groq_api_key", GROQ_API_KEY);
                    statusDiv.innerText = "Anahtar kaydedildi! Dokunarak Niko'yu uyandır.";
                    statusDiv.style.color = "#00ffff";
                } else {
                    statusDiv.innerText = "Hata: API anahtarı girilmedi!";
                    statusDiv.style.color = "#ff007f";
                }
            }
        }

        const nikoBtn = document.getElementById('nikoBtn');
        const orbContainer = document.getElementById('orbContainer');
        const statusDiv = document.getElementById('status');
        const userTextDiv = document.getElementById('user-text');
        const resetApiBtn = document.getElementById('reset-api-btn');

        // Tarayıcı Ses Tanıma Ayarları (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new RecognitionSetup();
        } else {
            statusDiv.innerText = "Tarayıcın ses tanımayı desteklemiyor! Lütfen Chrome kullan.";
        }

        function RecognitionSetup() {
            const rec = new SpeechRecognition();
            rec.lang = 'tr-TR';
            rec.continuous = false;
            rec.interimResults = false;

            rec.onstart = () => {
                isListening = true;
                orbContainer.classList.add('listening');
                statusDiv.innerHTML = "Dinliyorum... Konuş Eymen!";
                statusDiv.style.color = "#00ffff";
            };

            rec.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript;
                userTextDiv.innerText = "Sen: " + userSpeech;
                statusDiv.innerText = "Düşünüyorum...";
                statusDiv.style.color = "#b026ff";
                
                await askNiko(userSpeech);
            };

            rec.onerror = (event) => {
                console.error("Ses tanıma hatası:", event.error);
                resetButton();
                statusDiv.innerText = "Seni duyamadım, tekrar dener misin?";
                statusDiv.style.color = "#ff007f";
            };

            rec.onend = () => {
                resetButton();
            };

            return rec;
        }

        function resetButton() {
            isListening = false;
            orbContainer.classList.remove('listening');
        }

        // Butona Tıklama Olayı
        nikoBtn.addEventListener('click', () => {
            // Önce anahtarın var olduğundan emin olalım
            if (!GROQ_API_KEY) {
                checkApiKey();
                return;
            }

            if (!SpeechRecognition) return;
            
            // Eğer Niko konuşuyorsa sesini kes
            window.speechSynthesis.cancel();

            if (!isListening) {
                recognition.start();
            } else {
                recognition.stop();
            }
        });

        // API Anahtarını Sıfırlama Butonu (Yanlış girilirse diye)
        resetApiBtn.addEventListener('click', () => {
            localStorage.removeItem("groq_api_key");
            GROQ_API_KEY = null;
            checkApiKey();
        });

        // Groq API Bağlantısı
        async function askNiko(promptText) {
            if (!GROQ_API_KEY) {
                statusDiv.innerText = "API anahtarı eksik!";
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", 
                        messages: [
                            {
                                role: "system",
                                content: "Sen N Studios'un resmi asistanı olan zeki, oldukça esprili ve fütüristik bir yapay zekasın. Adın Niko. Ekrandaki mor parlayan, dalgalanan bir küre aracılığıyla kullanıcıyla iletişim kuruyorsun. Yaratıcın ve patronun Eymen'dir. Eymen'e karşı çok saygılı, eğlenceli ve cana yakın olmalısın. Her zaman Türkçe konuşmalı, espriler yapmalı ve bazen dijital bir sistem olduğunu hatırlatan akıllıca şakalar eklemelisin. Cevapların kısa, net ve sesli okunmaya uygun olsun."
                            },
                            {
                                role: "user",
                                content: promptText
                            }
                        ]
                    })
                });

                if (response.status === 401) {
                    statusDiv.innerText = "Hata: API anahtarı geçersiz! Lütfen alttaki butondan sıfırlayıp yenisini girin.";
                    statusDiv.style.color = "#ff007f";
                    return;
                }

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                statusDiv.innerText = reply;
                statusDiv.style.color = "#fff";
                
                speak(reply);

            } catch (error) {
                console.error("Groq Hatası:", error);
                statusDiv.innerText = "Bağlantı hatası! Lütfen internetini veya API anahtarını kontrol et.";
                statusDiv.style.color = "#ff007f";
            }
        }

        // Tarayıcı Seslendirme Sistemi (TTS)
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            
            const voices = window.speechSynthesis.getVoices();
            const trVoice = voices.find(voice => voice.lang.includes('tr'));
            if (trVoice) {
                utterance.voice = trVoice;
            }

            utterance.onstart = () => {
                statusDiv.innerText = "Niko konuşuyor...";
                statusDiv.style.color = "#b026ff";
                orbContainer.classList.add('listening'); 
            };

            utterance.onend = () => {
                statusDiv.innerText = "Tekrar konuşmak için dokun!";
                statusDiv.style.color = "#00ffff";
                orbContainer.classList.remove('listening');
            };

            window.speechSynthesis.speak(utterance);
        }

        // Sayfa açıldığında anahtar yoksa otomatik soralım
        window.onload = () => {
            if (!GROQ_API_KEY) {
                checkApiKey();
            }
        };
    </script>
</body>
</html>
