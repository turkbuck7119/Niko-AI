<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Niko AI - N Studios</title>
    <style>
        body { background: #000; color: #ff00ff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; margin: 0; }
        .niko-btn {
            width: 130px; height: 130px; background: #ff00ff;
            border-radius: 50%; border: 5px solid #fff;
            box-shadow: 0 0 30px #ff00ff; cursor: pointer;
        }
        #status { margin-top: 20px; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

    <div class="niko-btn" id="nikoBtn"></div>
    <div id="status">SİSTEM YÜKLENİYOR...</div>

    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.browser.js"></script>

    <script>
        const PUBLIC_KEY = '4a9959e2-3154-45d1-ae41-11a9cdfd51d3'; 
        const ASSISTANT_ID = '71b539bc-fd3d-4e32-8781-17d5c0d64c0a';

        let vapiInstance = null;
        const btn = document.getElementById('nikoBtn');
        const status = document.getElementById('status');

        // Vapi'nin yüklenmesini bekleyen fonksiyon
        function initializeVapi() {
            if (typeof Vapi !== 'undefined') {
                vapiInstance = new Vapi(PUBLIC_KEY);
                status.innerText = "NIKO HAZIR!\nDOKUN KONUŞ";
                console.log("Vapi başarıyla yüklendi.");
                
                vapiInstance.on('call-start', () => { status.innerText = "NIKO DİNLİYOR..."; });
                vapiInstance.on('speech-start', () => { status.innerText = "NIKO KONUŞUYOR..."; });
                vapiInstance.on('call-end', () => { status.innerText = "NIKO UYKUDA"; });
            } else {
                status.innerText = "VAPI YÜKLENEMEDİ!\nSAYFAYI YENİLE.";
            }
        }

        // Sayfa tamamen yüklendiğinde 1 saniye bekle ve başlat
        window.onload = () => {
            setTimeout(initializeVapi, 1000);
        };

        btn.onclick = () => {
            if (vapiInstance) {
                status.innerText = "BAĞLANILIYOR...";
                vapiInstance.start(ASSISTANT_ID);
            } else {
                alert("Sistem henüz hazır değil, lütfen bekle.");
            }
        };
    </script>
</body>
</html>
