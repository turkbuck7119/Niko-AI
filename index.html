            <button id="add-to-home-btn" class="action-btn" type="button" style="background: #00ffff; color: #000; border: none;">Ana Ekrana Ekle</button>

        addToHomeBtn.addEventListener('click', () => {

        // ... (Diğer kodlar aynı kalacak)
