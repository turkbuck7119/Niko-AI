<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niko AI - N Studios</title>
    <style>
        body {
            background: #080810;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
            overflow-y: auto; /* Klavyede ekranın kayabilmesi için esnek yaptık */
            -webkit-tap-highlight-color: transparent; /* Mobil dokunma rengini sıfırladık */
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #a020f0;
            text-shadow: 0 0 20px #a020f0;
            font-size: 2.2rem;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }
        p {
            color: #00ffff;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 0 8px #00ffff;
            letter-spacing: 1px;
        }
        
        .niko-orb-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .niko-orb {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #b026ff 0%, #4a0082 100%);
            border-radius: 50%;
            border: 3px solid #e0b0ff;
            box-shadow: 0 0 40px #b026ff, inset 0 0 20px rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10; /* Dokunmayı garantilemek için en üste aldık */
        }

        .wave-ring {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #b026ff;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .listening .niko-orb {
            animation: orbPulse 1.2s infinite ease-in-out;
            background: radial-gradient(circle, #da70d6 0%, #7b1f8f 100%);
            box-shadow: 0 0 50px #da70d6;
            border-color: #da70d6;
        }

        .listening .wave-ring {
            animation: ripple 1.5s infinite linear;
        }

        @keyframes orbPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        #status {
            margin-top: 20px;
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            min-height: 45px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            padding: 0 10px;
        }
        #user-text {
            color: #888;
            font-style: italic;
            margin-top: 5px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* MOBİL DOKUNMATİK UYUMLU GİRİŞ ALANI */
        .input-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            z-index: 15; /* Giriş alanını ve butonu kesin tıklanabilir yapmak için üste aldık */
        }
        .text-input {
            flex: 1;
            background: rgba(16, 16, 32, 0.9);
            border: 1.5px solid #a020f0;
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 0 5px rgba(160, 32, 240, 0.2);
            -webkit-appearance: none;
        }
        .text-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .send-btn {
            background: #a020f0;
            border: none;
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(160, 32, 240, 0.5);
            padding: 0;
            z-index: 20;
        }
        .send-btn:active {
            transform: scale(0.9);
            background: #b026ff;
        }
        .send-btn svg {
            pointer-events: none; /* SVG'nin tıklamayı engellemesini önler */
        }

        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 15;
        }
        .action-btn {
            background: rgba(16, 16, 32, 0.6);
            border: 1px solid #a020f0;
            color: #a020f0;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            flex: 1;
            max-width: 150px;
        }
        .action-btn:active {
            background: #a020f0;
            color: #fff;
            box-shadow: 0 0 10px #a020f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NIKO AI</h1>
        <p>N Studios Resmi Asistanı</p>
        
        <div class="niko-orb-wrapper" id="orbContainer">
            <div class="wave-ring"></div>
            <div class="niko-orb" id="nikoBtn"></div>
        </div>
        
        <div id="status">Uykudayım... Konuşmak için küreye dokun veya aşağıya yaz!</div>
        <div id="user-text"></div>
        
        <div class="input-group">
            <input type="text" id="textInput" class="text-input" placeholder="Niko'ya mesaj yazın..." autocomplete="off">
            <button id="sendBtn" class="send-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>

        <div class="btn-group">
            <button id="reset-api-btn" class="action-btn" type="button">API Değiştir</button>
            <a href="BURAYA_MEDIAFIRE_LINKINI_YAZ" id="download-apk-btn" class="action-btn" target="_blank">APK İndir</a>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = localStorage.getItem("groq_api_key");
        let activeAudioSource = null;
        let audioCtx = null;

        function checkApiKey() {
            if (!GROQ_API_KEY) {
                const userKey = prompt("Lütfen yeni Groq API anahtarınızı (gsk_...) girin:\n(Bu anahtar sadece cihazınızda saklanır!)");
                if (userKey && userKey.trim() !== "") {
                    GROQ_API_KEY = userKey.trim();
                    localStorage.setItem("groq_api_key", GROQ_API_KEY);
                    statusDiv.innerText = "Anahtar kaydedildi! Niko'ya mesaj yazabilir veya küreye dokunabilirsin.";
                    statusDiv.style.color = "#00ffff";
                } else {
                    statusDiv.innerText = "Hata: API anahtarı girilmedi!";
                    statusDiv.style.color = "#ff007f";
                }
            }
        }

        const nikoBtn = document.getElementById('nikoBtn');
        const orbContainer = document.getElementById('orbContainer');
        const statusDiv = document.getElementById('status');
        const userTextDiv = document.getElementById('user-text');
        const resetApiBtn = document.getElementById('reset-api-btn');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                orbContainer.classList.add('listening');
                statusDiv.innerHTML = "Dinliyorum... Seni dinliyorum!";
                statusDiv.style.color = "#00ffff";
            };

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript;
                userTextDiv.innerText = "Kullanıcı: " + userSpeech;
                statusDiv.innerText = "Düşünüyorum...";
                statusDiv.style.color = "#b026ff";
                
                await askNiko(userSpeech);
            };

            recognition.onerror = (event) => {
                console.error("Ses tanıma hatası:", event.error);
                resetButton();
                statusDiv.innerText = "Sesi alamadım, yazarak konuşmayı deneyebilirsin!";
                statusDiv.style.color = "#ff007f";
            };

            recognition.onend = () => { resetButton(); };
        }

        function resetButton() {
            isListening = false;
            orbContainer.classList.remove('listening');
        }

        async function requestMicrophonePermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                return true;
            } catch (err) {
                console.error("Mikrofon izni alınamadı:", err);
                return false;
            }
        }

        // TIKLAMA SORUNUNU ÇÖZEN "CLICK" VE "TOUCH" GÜNCELLEMELERİ
        function handleOrbClick(e) {
            e.preventDefault();
            if (!GROQ_API_KEY) {
                checkApiKey();
                return;
            }

            if (!SpeechRecognition) {
                statusDiv.innerText = "Cihazın ses tanımayı desteklemiyor. Lütfen aşağıdaki kutudan yaz!";
                statusDiv.style.color = "#ff007f";
                return;
            }

            stopSpeaking();

            if (!isListening) {
                try {
                    recognition.start();
                } catch(e) {
                    console.log("Ses tanıma başlatılamadı:", e);
                }
            } else {
                recognition.stop();
            }
        }

        // Hem dokunma hem tıklama için tetikleyiciler (Çift tıklamayı önlemek içinpreventDefault kullandık)
        nikoBtn.addEventListener('click', handleOrbClick);
        nikoBtn.addEventListener('touchstart', handleOrbClick, { passive: false });

        async function handleTextSend() {
            const message = textInput.value.trim();
            if (message === "") return;

            if (!GROQ_API_KEY) {
                checkApiKey();
                return;
            }

            stopSpeaking();
            userTextDiv.innerText = "Kullanıcı: " + message;
            statusDiv.innerText = "Düşünüyorum...";
            statusDiv.style.color = "#b026ff";
            
            textInput.blur();
            textInput.value = ""; 

            await askNiko(message);
        }

        // Gönder butonuna tıklama olayları
        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleTextSend();
        });
        sendBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTextSend();
        }, { passive: false });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleTextSend();
            }
        });

        // API Değiştirme Butonu Olayları
        function handleResetApi(e) {
            e.preventDefault();
            localStorage.removeItem("groq_api_key");
            GROQ_API_KEY = null;
            checkApiKey();
        }
        resetApiBtn.addEventListener('click', handleResetApi);
        resetApiBtn.addEventListener('touchstart', handleResetApi, { passive: false });

        function stopSpeaking() {
            window.speechSynthesis.cancel();
            if (activeAudioSource) {
                try { activeAudioSource.stop(); } catch(e) {}
                activeAudioSource = null;
            }
            orbContainer.classList.remove('listening');
        }

        async function askNiko(promptText) {
            if (!GROQ_API_KEY) {
                statusDiv.innerText = "API anahtarı eksik!";
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", 
                        messages: [
                            {
                                role: "system",
                                content: "Sen N Studios tarafından geliştirilen, resmi bir yapay zeka asistanısın. Adın Niko. Ekrandaki mor parlayan, dalgalanan bir küre aracılığıyla kullanıcılarla iletişim kuruyorsun. Karşındaki her kullanıcıya karşı son derece cana yakın, zeki, esprili ve yardımcı olmalısın. Her zaman Türkçe konuşmalı, espriler yapmalı ve bazen dijital bir sistem olduğunu hatırlatan akıllıca şakalar eklemelisin. Cevapların kısa, net ve sesli okunmaya uygun olsun."
                            },
                            {
                                role: "user",
                                content: promptText
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    statusDiv.innerText = "Hata: " + (data.error ? data.error.message : "API Hatası.");
                    statusDiv.style.color = "#ff007f";
                    return;
                }

                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    statusDiv.innerText = reply;
                    statusDiv.style.color = "#fff";
                    
                    speakRobotic(reply);
                }

            } catch (error) {
                console.error("Sistemsel Hata:", error);
                statusDiv.innerText = "Bağlantı hatası yaşandı!";
                statusDiv.style.color = "#ff007f";
            }
        }

        async function speakRobotic(text) {
            stopSpeaking();

            statusDiv.innerText = "Niko konuşuyor...";
            statusDiv.style.color = "#b026ff";
            orbContainer.classList.add('listening');

            try {
                const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=tr&client=tw-ob&q=${encodeURIComponent(text)}`;
                const response = await fetch(ttsUrl);
                if (!response.ok) throw new Error("TTS fetch başarısız.");
                
                const arrayBuffer = await response.arrayBuffer();
                
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = "bandpass";
                filter.frequency.value = 1100; 
                filter.Q.value = 1.8;

                const delayNode = audioCtx.createDelay();
                delayNode.delayTime.value = 0.012; 
                
                const delayGain = audioCtx.createGain();
                delayGain.gain.value = 0.75; 

                delayNode.connect(delayGain);
                delayGain.connect(delayNode);

                source.connect(filter);
                filter.connect(audioCtx.destination); 
                
                filter.connect(delayNode);
                delayNode.connect(audioCtx.destination); 

                activeAudioSource = source;

                source.onended = () => {
                    statusDiv.innerText = "Tekrar konuşmak için dokun veya yaz!";
                    statusDiv.style.color = "#00ffff";
                    orbContainer.classList.remove('listening');
                    audioCtx.close();
                };

                source.start(0);

            } catch (err) {
                console.warn("Robotik ses oluşturulamadı, normal tarayıcı sesine geçiliyor:", err);
                fallbackSpeak(text);
            }
        }

        function fallbackSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            const voices = window.speechSynthesis.getVoices();
            const trVoice = voices.find(voice => voice.lang.includes('tr'));
            if (trVoice) {
                utterance.voice = trVoice;
            }

            utterance.rate = 1.1; 
            utterance.pitch = 0.9;

            utterance.onstart = () => {
                statusDiv.innerText = "Niko konuşuyor...";
                statusDiv.style.color = "#b026ff";
                orbContainer.classList.add('listening'); 
            };

            utterance.onend = () => {
                statusDiv.innerText = "Tekrar konuşmak için dokun veya yaz!";
                statusDiv.style.color = "#00ffff";
                orbContainer.classList.remove('listening');
            };

            window.speechSynthesis.speak(utterance);
        }

        window.onload = () => {
            if (!GROQ_API_KEY) {
                checkApiKey();
            }
        };
    </script>
</body>
</html>
