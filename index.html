<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niko AI - N Studios</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <style>
        body {
            background: #000;
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #niko-status {
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff00ff;
        }
        .circle-container {
            position: relative;
            cursor: pointer;
        }
        .niko-btn {
            width: 150px;
            height: 150px;
            background: #ff00ff;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 30px #ff00ff;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }
        .niko-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px #ff00ff; }
        .niko-btn:active { transform: scale(0.95); }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px #ff00ff; }
            50% { box-shadow: 0 0 40px #ff00ff; transform: scale(1.02); }
            100% { box-shadow: 0 0 20px #ff00ff; }
        }
        .info-text { margin-top: 30px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div id="niko-status">NIKO: UYKU MODUNDA</div>
    
    <div class="circle-container" id="startButton">
        <div class="niko-btn"></div>
    </div>

    <div class="info-text">N Studios - Niko AI</div>

    <script>
        // --- AYARLAR ---
        const APP_ID = '559f382253324aa1918f2bbdb3e7fb1e'; // <--- Kopyaladığın ID'yi buraya yapıştır
        const CHANNEL = 'niko_room';
        
        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack;
        let isConnected = false;

        const startBtn = document.getElementById('startButton');
        const statusText = document.getElementById('niko-status');

        async function connectNiko() {
            if(isConnected) return;
            
            try {
                statusText.innerText = "BAĞLANTI DENENİYOR...";
                
                // Agora kanalına bağlanma
                await client.join(APP_ID, CHANNEL, null, null);
                
                // Mikrofona erişim izni alma
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                
                // Sesi kanala gönderme
                await client.publish([localAudioTrack]);
                
                statusText.innerText = "NIKO AKTİF - KONUŞABİLİRSİN";
                statusText.style.color = "#00ff00";
                isConnected = true;
                console.log("Bağlantı başarılı!");

            } catch (error) {
                console.error("Hata:", error);
                statusText.innerText = "HATA: Mikrofonu Kontrol Et!";
                statusText.style.color = "red";
            }
        }

        startBtn.addEventListener('click', connectNiko);

        // Birisi konuştuğunda (opsiyonel görsel tepki için)
        client.on("user-published", async (user, mediaType) => {
            if (mediaType === "audio") {
                await client.subscribe(user, mediaType);
                user.audioTrack.play();
                statusText.innerText = "NIKO CEVAP VERİYOR...";
            }
        });
    </script>
</body>
</html>
